<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diagnostic Auth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0a0a0a; color: #eee; padding: 2rem; }
    h1 { color: #F5C842; font-size: 20px; margin-bottom: 1.5rem; letter-spacing: 2px; }
    .card { background: #161616; border: 1px solid #333; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    .card h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    input { width: 100%; padding: 10px 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; font-family: monospace; font-size: 13px; outline: none; margin-bottom: 8px; }
    input:focus { border-color: #F5C842; }
    button { background: #F5C842; color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-family: monospace; font-weight: 700; font-size: 13px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
    button.sec { background: #333; color: #F5C842; border: 1px solid #F5C842; }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ok { background: #2ecc71; } .err { background: #e74c3c; } .wait { background: #e67e22; animation: p 1s infinite; }
    @keyframes p { 0%,100%{opacity:1}50%{opacity:.3} }
    .val { color: #888; font-size: 11px; flex: 1; }
    pre { background: #000; border-radius: 8px; padding: 12px; font-size: 11px; color: #2ecc71; overflow-x: auto; margin-top: 8px; max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .sep { height: 1px; background: #333; margin: 12px 0; }
  </style>
</head>
<body>
<h1>⚙ DIAGNOSTIC AUTH — OURSBELILLE</h1>

<div class="card">
  <h2>Configuration</h2>
  <input id="url" placeholder="URL Supabase (https://xxx.supabase.co)"/>
  <input id="key" placeholder="Clé anon"/>
  <input id="email" placeholder="Email (bricenogues65@gmail.com)"/>
  <input id="pwd" placeholder="Mot de passe (riton65)" type="password"/>
  <button onclick="runAll()">▶ Lancer diagnostic</button>
  <button class="sec" onclick="testSignup()">➕ Créer compte test</button>
</div>

<div class="card">
  <h2>Résultats</h2>
  <div class="row"><div class="dot wait" id="d1"></div><div>URL Supabase valide</div><div class="val" id="v1">—</div></div>
  <div class="row"><div class="dot wait" id="d2"></div><div>Connexion Supabase (ping)</div><div class="val" id="v2">—</div></div>
  <div class="row"><div class="dot wait" id="d3"></div><div>Email Confirmé</div><div class="val" id="v3">—</div></div>
  <div class="row"><div class="dot wait" id="d4"></div><div>Login email/password</div><div class="val" id="v4">—</div></div>
  <div class="row"><div class="dot wait" id="d5"></div><div>Email provider activé</div><div class="val" id="v5">—</div></div>
</div>

<div class="card">
  <h2>Logs</h2>
  <pre id="logs">Aucun test lancé.</pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Pré-remplir
  document.getElementById('url').value = 'https://btdrbvbchccqjzwyhcfg.supabase.co';
  document.getElementById('key').value = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0ZHJidmJjaGNjcWp6d3loY2ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzQ1OTcsImV4cCI6MjA5MjUxMDU5N30.FGEwM0hz7kevHw3MM-ZQZtTLeHda4XPxvsYrr2cUcb8';
  document.getElementById('email').value = 'bricenogues65@gmail.com';
  document.getElementById('pwd').value = 'riton65';

  let logs = [];
  function log(m) { logs.push('['+new Date().toLocaleTimeString()+'] '+m); document.getElementById('logs').textContent = logs.join('\n'); }
  function dot(id, state, val) {
    document.getElementById('d'+id).className = 'dot '+state;
    if(val) document.getElementById('v'+id).textContent = val;
  }

  async function runAll() {
    logs = [];
    const url = document.getElementById('url').value.trim();
    const key = document.getElementById('key').value.trim();
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('pwd').value;

    // Test 1 — URL
    const urlOk = url.startsWith('https://') && url.includes('.supabase.co');
    dot(1, urlOk?'ok':'err', urlOk?'✓ Format OK':'✗ URL invalide');
    log('URL: ' + url);
    if(!urlOk) return;

    const sb = supabase.createClient(url, key);

    // Test 2 — Ping (table publique)
    log('→ Ping Supabase...');
    dot(2, 'wait', 'Test...');
    try {
      const { error } = await sb.from('comite_members').select('count').limit(1);
      if(error) { dot(2,'err','✗ '+error.message); log('✗ '+error.message); }
      else { dot(2,'ok','✓ Connecté'); log('✓ Supabase accessible'); }
    } catch(e) { dot(2,'err','✗ '+e.message); log('✗ '+e.message); }

    // Test 3 — Vérifier si email existe dans comite_members
    log('→ Vérif email dans comite_members...');
    dot(3, 'wait', 'Test...');
    try {
      const { data, error } = await sb.from('comite_members').select('*').eq('email', email);
      if(error) { dot(3,'err','✗ '+error.message); log('✗ '+error.message); }
      else if(!data || data.length === 0) { dot(3,'err','✗ Email absent de comite_members'); log('✗ Email non trouvé dans la table'); }
      else { dot(3,'ok','✓ '+JSON.stringify(data[0])); log('✓ Membre trouvé: '+JSON.stringify(data[0])); }
    } catch(e) { dot(3,'err','✗ '+e.message); }

    // Test 4 — Login
    log('→ Test signInWithPassword...');
    dot(4, 'wait', 'Test...');
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
      if(error) {
        dot(4,'err','✗ '+error.message);
        log('✗ Erreur login: '+error.message+' (code: '+error.status+')');
      } else {
        dot(4,'ok','✓ Connecté ! user_id='+data.user.id);
        log('✓ LOGIN OK: '+JSON.stringify(data.user.email));
        await sb.auth.signOut();
      }
    } catch(e) { dot(4,'err','✗ '+e.message); log('✗ '+e.message); }

    // Test 5 — Vérif settings (on tente un signup pour voir le message d'erreur)
    log('→ Test provider email...');
    dot(5, 'wait', 'Test...');
    try {
      const { error } = await sb.auth.signUp({ email: 'test_diag_'+Date.now()+'@test.com', password: 'test123456' });
      if(error && error.message.includes('disabled')) {
        dot(5,'err','✗ Email provider désactivé !');
        log('✗ Email provider désactivé: '+error.message);
      } else {
        dot(5,'ok','✓ Email provider actif');
        log('✓ Email provider actif');
      }
    } catch(e) { dot(5,'err','✗ '+e.message); }

    log('✅ Diagnostic terminé.');
  }

  async function testSignup() {
    const url = document.getElementById('url').value.trim();
    const key = document.getElementById('key').value.trim();
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('pwd').value;
    const sb = supabase.createClient(url, key);
    log('→ Tentative signup avec '+email+'...');
    const { data, error } = await sb.auth.signUp({ email, password: pwd });
    if(error) log('✗ Signup error: '+error.message+' ('+error.status+')');
    else log('✓ Signup OK: '+JSON.stringify(data.user?.email)+' confirmed='+data.user?.email_confirmed_at);
  }
</script>
</body>
</html>
